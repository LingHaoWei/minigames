<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Clone</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #333;
    user-select: none;
  }
  h1 {
    margin: 10px 0;
    color: #333;
    font-weight: 600;
  }
  #wrap {
    position: relative;
  }
  canvas {
    background: #fafafa;
    border: 2px solid #999;
    border-radius: 4px;
    display: block;
    cursor: pointer;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(255,255,255,0.85);
    pointer-events: none;
  }
  #overlay .title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
  }
  #overlay .sub {
    font-size: 14px;
    color: #666;
  }
  #hint {
    margin-top: 10px;
    font-size: 13px;
    color: #777;
  }
</style>
</head>
<body>

<h1>Flappy Clone</h1>
<div id="wrap">
  <canvas id="game" width="360" height="520"></canvas>
  <div id="overlay">
    <div class="title" id="overlayTitle">Tap or Press Space to Start</div>
    <div class="sub" id="overlaySub">Fly through the pipes!</div>
  </div>
</div>
<div id="hint">Click / Tap the game, or press Space, to flap</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const W = canvas.width, H = canvas.height;

const GRAVITY = 0.42;
const FLAP = -7.2;
const PIPE_GAP = 145;
const PIPE_WIDTH = 60;
const PIPE_SPEED = 2.6;
const GROUND_HEIGHT = 70;

let bird, pipes, frame, score, best, state; // state: 'ready' | 'playing' | 'over'

best = Number(localStorage && 0) || 0; // no persistent storage used, kept at 0
best = 0;

function reset() {
  bird = { x: 80, y: H/2, r: 14, vy: 0, rot: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  state = 'ready';
  overlay.style.display = 'flex';
  overlayTitle.textContent = 'Tap or Press Space to Start';
  overlaySub.textContent = 'Fly through the pipes!';
}

function flap() {
  if (state === 'ready') {
    state = 'playing';
    overlay.style.display = 'none';
  }
  if (state === 'playing') {
    bird.vy = FLAP;
  }
  if (state === 'over') {
    reset();
  }
}

canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});

function spawnPipe() {
  const margin = 60;
  const gapY = margin + Math.random() * (H - GROUND_HEIGHT - PIPE_GAP - margin * 2);
  pipes.push({ x: W, gapY, passed: false });
}

function update() {
  if (state !== 'playing') return;

  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rot = Math.max(-25, Math.min(90, bird.vy * 4));

  frame++;
  if (frame % 95 === 0) spawnPipe();

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
      p.passed = true;
      score++;
    }

    if (p.x < -PIPE_WIDTH) {
      pipes.splice(i, 1);
    }

    // collision
    const withinX = bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_WIDTH;
    const hitTop = bird.y - bird.r < p.gapY;
    const hitBottom = bird.y + bird.r > p.gapY + PIPE_GAP;
    if (withinX && (hitTop || hitBottom)) {
      endGame();
    }
  }

  if (bird.y + bird.r > H - GROUND_HEIGHT) {
    bird.y = H - GROUND_HEIGHT - bird.r;
    endGame();
  }
  if (bird.y - bird.r < 0) {
    bird.y = bird.r;
    bird.vy = 0;
  }
}

function endGame() {
  if (state === 'over') return;
  state = 'over';
  best = Math.max(best, score);
  overlay.style.display = 'flex';
  overlayTitle.textContent = 'Game Over';
  overlaySub.textContent = `Score: ${score}  |  Best: ${best}  —  Tap to retry`;
}

function drawPipes() {
  pipes.forEach(p => {
    ctx.fillStyle = '#e0e0e0';
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    // top pipe
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.gapY);
    // bottom pipe
    ctx.fillRect(p.x, p.gapY + PIPE_GAP, PIPE_WIDTH, H - GROUND_HEIGHT - (p.gapY + PIPE_GAP));
    ctx.strokeRect(p.x, p.gapY + PIPE_GAP, PIPE_WIDTH, H - GROUND_HEIGHT - (p.gapY + PIPE_GAP));
    // caps
    ctx.fillStyle = '#ccc';
    ctx.fillRect(p.x - 3, p.gapY - 16, PIPE_WIDTH + 6, 16);
    ctx.strokeRect(p.x - 3, p.gapY - 16, PIPE_WIDTH + 6, 16);
    ctx.fillRect(p.x - 3, p.gapY + PIPE_GAP, PIPE_WIDTH + 6, 16);
    ctx.strokeRect(p.x - 3, p.gapY + PIPE_GAP, PIPE_WIDTH + 6, 16);
  });
}

function drawGround() {
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - GROUND_HEIGHT);
  ctx.lineTo(W, H - GROUND_HEIGHT);
  ctx.stroke();
  ctx.fillStyle = '#ccc';
  for (let x = -(frame * PIPE_SPEED % 30); x < W; x += 30) {
    ctx.fillRect(x, H - GROUND_HEIGHT, 15, 8);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot * Math.PI / 180);
  ctx.fillStyle = '#ddd';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.r, bird.r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // eye
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(6, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // beak
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(bird.r - 2, -2);
  ctx.lineTo(bird.r + 8, 1);
  ctx.lineTo(bird.r - 2, 5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawScore() {
  ctx.fillStyle = '#333';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 50);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawPipes();
  drawGround();
  drawBird();
  if (state === 'playing') drawScore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
