<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Game Hub</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background: #f4f4f4;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #333;
  }
  #header {
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 22px;
    font-weight: 600;
  }
  p.sub {
    color: #888;
    margin: 0;
    font-size: 13px;
  }
  #searchBox {
    width: 100%;
    max-width: 640px;
    margin-bottom: 16px;
  }
  #searchBox input {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    border: 2px solid #ddd;
    border-radius: 6px;
    outline: none;
    background: #fff;
    color: #333;
  }
  #searchBox input:focus {
    border-color: #999;
  }
  #list {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 340px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    border: 1px solid #e2e2e2;
    border-radius: 6px;
    padding: 12px 16px;
    text-decoration: none;
    color: #333;
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .row:hover {
    border-color: #aaa;
    background: #fafafa;
  }
  .row .icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .row .text {
    flex: 1;
    min-width: 0;
  }
  .row .text h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  .row .text p {
    margin: 2px 0 0 0;
    font-size: 12px;
    color: #999;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row .arrow {
    font-size: 14px;
    color: #bbb;
    flex-shrink: 0;
  }
  #empty {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    padding: 40px 0;
    display: none;
  }
  #pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
  }
  #pagination button {
    min-width: 30px;
    height: 30px;
    padding: 0 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #555;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
  }
  #pagination button:hover:not(:disabled) {
    border-color: #999;
  }
  #pagination button.active {
    background: #333;
    color: #fff;
    border-color: #333;
  }
  #pagination button:disabled {
    opacity: 0.4;
    cursor: default;
  }
  #note {
    margin-top: 28px;
    font-size: 11px;
    color: #aaa;
    text-align: center;
    max-width: 500px;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Mini Game Hub</h1>
  <p class="sub"><span id="countLabel"></span></p>
</div>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Search games...">
</div>

<div id="list"></div>
<div id="empty">No games found.</div>

<div id="pagination"></div>

<div id="note">
  Keep this file in the same folder as the game files for the links to work.
</div>

<script>
// ---- Add new games here as you build them ----
const GAMES = [
  { icon: '⭐', name: 'Catch the Stars', desc: 'Move the basket, catch falling stars', file: 'games/catch-the-stars.html' },
  { icon: '🔨', name: 'Whack-a-Mole', desc: 'Click moles before time runs out', file: 'games/whack-a-mole.html' },
  { icon: '🐦', name: 'Flappy Clone', desc: 'Flap through the pipes', file: 'games/flappy-clone-simple.html' },
  { icon: '🐍', name: 'Snake', desc: "Eat food, grow, don't crash", file: 'games/snake.html' },
  { icon: '', name: 'Typing Speed Test', desc: "Type!", file: 'games/typing-speed-test.html' },
  { icon: '', name: 'Memory Test', desc: "See and remember :)", file: 'games/memory-match.html' },
];
// ------------------------------------------------

const PAGE_SIZE = 6;
let currentPage = 1;
let filtered = GAMES.slice();

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const paginationEl = document.getElementById('pagination');
const countLabel = document.getElementById('countLabel');
const searchInput = document.getElementById('searchInput');

function render() {
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  listEl.innerHTML = '';
  emptyEl.style.display = pageItems.length ? 'none' : 'block';

  pageItems.forEach(g => {
    const a = document.createElement('a');
    a.className = 'row';
    a.href = g.file;
    a.innerHTML = `
      <div class="icon">${g.icon}</div>
      <div class="text">
        <h2>${g.name}</h2>
        <p>${g.desc}</p>
      </div>
      <div class="arrow">→</div>
    `;
    listEl.appendChild(a);
  });

  countLabel.textContent = `${filtered.length} game${filtered.length === 1 ? '' : 's'}`;

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  paginationEl.innerHTML = '';
  if (totalPages <= 1) return;

  const prevBtn = document.createElement('button');
  prevBtn.textContent = '‹';
  prevBtn.disabled = currentPage === 1;
  prevBtn.onclick = () => { currentPage--; render(); };
  paginationEl.appendChild(prevBtn);

  for (let p = 1; p <= totalPages; p++) {
    const btn = document.createElement('button');
    btn.textContent = p;
    if (p === currentPage) btn.classList.add('active');
    btn.onclick = () => { currentPage = p; render(); };
    paginationEl.appendChild(btn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.textContent = '›';
  nextBtn.disabled = currentPage === totalPages;
  nextBtn.onclick = () => { currentPage++; render(); };
  paginationEl.appendChild(nextBtn);
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  filtered = GAMES.filter(g =>
    g.name.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q)
  );
  currentPage = 1;
  render();
});

render();
</script>

</body>
</html>
