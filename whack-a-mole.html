<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-a-Mole</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #2e7d32 0%, #1b5e20 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
  }
  h1 {
    margin: 10px 0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
  }
  #info {
    display: flex;
    gap: 30px;
    font-size: 20px;
    margin-bottom: 16px;
    background: rgba(0,0,0,0.2);
    padding: 8px 20px;
    border-radius: 10px;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px);
    gap: 14px;
    background: #4e342e;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .hole {
    position: relative;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle at 50% 60%, #2d1b12, #6d4c34 70%);
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    box-shadow: inset 0 8px 12px rgba(0,0,0,0.6);
  }
  .mole {
    position: absolute;
    left: 50%;
    bottom: -100%;
    width: 78px;
    height: 78px;
    transform: translateX(-50%);
    transition: bottom 0.15s ease-out;
    font-size: 60px;
    text-align: center;
    line-height: 78px;
    user-select: none;
  }
  .hole.up .mole {
    bottom: 14px;
  }
  .hole.whacked .mole {
    bottom: -100% !important;
    transition: bottom 0.08s ease-in;
  }
  #message {
    margin-top: 18px;
    font-size: 22px;
    min-height: 28px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }
  button {
    margin-top: 10px;
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #ffca28;
    color: #4e342e;
    font-weight: bold;
    cursor: pointer;
    display: none;
  }
  button:hover { background: #ffd54f; }
</style>
</head>
<body>

<h1>🔨 Whack-a-Mole 🐹</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">30</span>s</div>
</div>
<div id="board"></div>
<div id="message"></div>
<button id="restartBtn">Play Again</button>

<script>
const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

const NUM_HOLES = 9;
let holes = [];
let score, timeLeft, gameTimer, moleTimer, activeHole, gameOver;

function buildBoard() {
  board.innerHTML = '';
  holes = [];
  for (let i = 0; i < NUM_HOLES; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const mole = document.createElement('div');
    mole.className = 'mole';
    mole.textContent = '🐹';
    hole.appendChild(mole);
    hole.addEventListener('click', () => whack(i));
    board.appendChild(hole);
    holes.push(hole);
  }
}

function popRandomMole() {
  holes.forEach(h => h.classList.remove('up', 'whacked'));
  const idx = Math.floor(Math.random() * NUM_HOLES);
  activeHole = idx;
  holes[idx].classList.add('up');

  const upTime = Math.max(450, 1000 - score * 20);
  moleTimer = setTimeout(() => {
    if (!gameOver) {
      holes[idx].classList.remove('up');
      popRandomMole();
    }
  }, upTime);
}

function whack(i) {
  if (gameOver) return;
  if (i === activeHole && holes[i].classList.contains('up')) {
    holes[i].classList.add('whacked');
    holes[i].classList.remove('up');
    score++;
    scoreEl.textContent = score;
    clearTimeout(moleTimer);
    popRandomMole();
  }
}

function tick() {
  timeLeft--;
  timeEl.textContent = timeLeft;
  if (timeLeft <= 0) {
    endGame();
  }
}

function endGame() {
  gameOver = true;
  clearTimeout(moleTimer);
  clearInterval(gameTimer);
  holes.forEach(h => h.classList.remove('up'));
  messageEl.textContent = `Time's up! Final Score: ${score}`;
  restartBtn.style.display = 'inline-block';
}

function init() {
  buildBoard();
  score = 0;
  timeLeft = 30;
  gameOver = false;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  messageEl.textContent = '';
  restartBtn.style.display = 'none';
  gameTimer = setInterval(tick, 1000);
  popRandomMole();
}

restartBtn.addEventListener('click', init);

init();
</script>

</body>
</html>
