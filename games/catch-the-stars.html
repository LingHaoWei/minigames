<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Stars</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #333;
  }
  h1 {
    margin: 10px 0;
    font-weight: 600;
  }
  #info {
    display: flex;
    gap: 30px;
    font-size: 16px;
    margin-bottom: 10px;
    color: #555;
  }
  canvas {
    background: #fafafa;
    border: 2px solid #999;
    border-radius: 4px;
  }
  #message {
    margin-top: 12px;
    font-size: 16px;
    min-height: 24px;
    color: #555;
  }
  button {
    margin-top: 10px;
    padding: 8px 22px;
    font-size: 14px;
    border: 1px solid #999;
    border-radius: 5px;
    background: #fff;
    color: #333;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }
  button:hover { border-color: #555; }
  #hint {
    margin-top: 6px;
    font-size: 13px;
    color: #999;
  }
</style>
</head>
<body>

<h1>Catch the Stars</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Lives: <span id="lives">3</span></div>
</div>
<canvas id="game" width="480" height="500"></canvas>
<div id="message"></div>
<button id="restartBtn">Restart</button>
<div id="hint">Use ← → arrow keys or A / D to move</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

const W = canvas.width, H = canvas.height;

let basket, stars, score, lives, gameOver, keys, spawnTimer, speed;

function init() {
  basket = { x: W/2 - 40, y: H - 30, w: 80, h: 16, speed: 7 };
  stars = [];
  score = 0;
  lives = 3;
  gameOver = false;
  keys = {};
  spawnTimer = 0;
  speed = 2.2;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  messageEl.textContent = '';
  restartBtn.style.display = 'none';
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

function spawnStar() {
  const x = Math.random() * (W - 20) + 10;
  const size = 10 + Math.random() * 8;
  stars.push({ x, y: -20, size, vy: speed + Math.random() * 1.5 });
}

function update() {
  if (gameOver) return;

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) basket.x -= basket.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) basket.x += basket.speed;
  basket.x = Math.max(0, Math.min(W - basket.w, basket.x));

  spawnTimer++;
  if (spawnTimer > Math.max(25, 60 - score)) {
    spawnStar();
    spawnTimer = 0;
  }

  for (let i = stars.length - 1; i >= 0; i--) {
    const s = stars[i];
    s.y += s.vy;

    // catch check
    if (
      s.y + s.size >= basket.y &&
      s.y - s.size <= basket.y + basket.h &&
      s.x >= basket.x - s.size &&
      s.x <= basket.x + basket.w + s.size
    ) {
      stars.splice(i, 1);
      score++;
      scoreEl.textContent = score;
      if (score % 5 === 0) speed += 0.4;
      continue;
    }

    // missed
    if (s.y - s.size > H) {
      stars.splice(i, 1);
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) {
        endGame();
      }
    }
  }
}

function drawStar(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI / 2) + (i * 2 * Math.PI / 5);
    const angle2 = angle + Math.PI / 5;
    ctx.lineTo(cx + r * Math.cos(angle), cy - r * Math.sin(angle));
    ctx.lineTo(cx + r * 0.45 * Math.cos(angle2), cy - r * 0.45 * Math.sin(angle2));
  }
  ctx.closePath();
  ctx.fillStyle = '#bbb';
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.fill();
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // basket
  ctx.fillStyle = '#555';
  ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

  // stars
  stars.forEach(s => drawStar(s.x, s.y, s.size));
}

function loop() {
  update();
  draw();
  if (!gameOver) requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  messageEl.textContent = `Game Over! Final Score: ${score}`;
  restartBtn.style.display = 'inline-block';
}

restartBtn.addEventListener('click', init);

init();
</script>

</body>
</html>
