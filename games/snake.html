<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #333;
    user-select: none;
  }
  h1 {
    margin: 10px 0;
    font-weight: 600;
  }
  #info {
    display: flex;
    gap: 30px;
    font-size: 16px;
    margin-bottom: 12px;
    color: #555;
  }
  #wrap {
    position: relative;
  }
  canvas {
    background: #fafafa;
    border: 2px solid #999;
    border-radius: 4px;
    display: block;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(255,255,255,0.85);
    border-radius: 4px;
  }
  #overlay .title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
  }
  #overlay .sub {
    font-size: 14px;
    color: #666;
  }
  #hint {
    margin-top: 10px;
    font-size: 13px;
    color: #999;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>Snake</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
</div>
<div id="wrap">
  <canvas id="game" width="400" height="400"></canvas>
  <div id="overlay">
    <div class="title" id="overlayTitle">Press Space or Tap to Start</div>
    <div class="sub" id="overlaySub">Use arrow keys or swipe to move</div>
  </div>
</div>
<div id="hint">Arrow keys / WASD to steer • Space to (re)start</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

let snake, dir, nextDir, food, score, best, state, moveInterval, tickTimer;

best = 0;

function reset() {
  snake = [
    { x: Math.floor(COLS/2), y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2) - 1, y: Math.floor(ROWS/2) },
    { x: Math.floor(COLS/2) - 2, y: Math.floor(ROWS/2) },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  moveInterval = 130;
  state = 'ready';
  placeFood();
  scoreEl.textContent = score;
  overlay.classList.remove('hidden');
  overlayTitle.textContent = 'Press Space or Tap to Start';
  overlaySub.textContent = 'Use arrow keys or swipe to move';
  draw();
}

function placeFood() {
  let valid = false;
  let fx, fy;
  while (!valid) {
    fx = Math.floor(Math.random() * COLS);
    fy = Math.floor(Math.random() * ROWS);
    valid = !snake.some(s => s.x === fx && s.y === fy);
  }
  food = { x: fx, y: fy };
}

function setDir(x, y) {
  // prevent reversing directly into self
  if (dir.x === -x && dir.y === -y && snake.length > 1) return;
  nextDir = { x, y };
}

function startGame() {
  if (state === 'over') { reset(); return; }
  if (state === 'ready') {
    state = 'playing';
    overlay.classList.add('hidden');
    scheduleTick();
  }
}

document.addEventListener('keydown', e => {
  const k = e.key;
  if (k === ' ') { e.preventDefault(); startGame(); return; }
  if (k === 'ArrowUp' || k === 'w' || k === 'W') setDir(0, -1);
  else if (k === 'ArrowDown' || k === 's' || k === 'S') setDir(0, 1);
  else if (k === 'ArrowLeft' || k === 'a' || k === 'A') setDir(-1, 0);
  else if (k === 'ArrowRight' || k === 'd' || k === 'D') setDir(1, 0);
  if (state === 'ready' && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(k)) {
    startGame();
  }
});

// touch swipe support
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  if (state !== 'playing') startGame();
}, { passive: true });
canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });
canvas.addEventListener('mousedown', () => { if (state !== 'playing') startGame(); });

function scheduleTick() {
  clearTimeout(tickTimer);
  tickTimer = setTimeout(gameTick, moveInterval);
}

function gameTick() {
  if (state !== 'playing') return;
  dir = nextDir;

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    moveInterval = Math.max(60, 130 - score * 4);
    placeFood();
  } else {
    snake.pop();
  }

  draw();
  scheduleTick();
}

function endGame() {
  state = 'over';
  best = Math.max(best, score);
  bestEl.textContent = best;
  overlay.classList.remove('hidden');
  overlayTitle.textContent = 'Game Over';
  overlaySub.textContent = `Score: ${score}  |  Best: ${best}  —  Press Space to retry`;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,0,0,0.04)';
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // food
  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 3, 0, Math.PI * 2);
  ctx.fill();

  // snake
  snake.forEach((s, i) => {
    const isHead = i === 0;
    ctx.fillStyle = isHead ? '#555' : '#888';
    ctx.strokeStyle = '#fafafa';
    ctx.lineWidth = 2;
    const pad = isHead ? 1 : 2;
    ctx.fillRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad*2, CELL - pad*2);
    ctx.strokeRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad*2, CELL - pad*2);
  });
}

reset();
</script>

</body>
</html>
