<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Whack-a-Mole</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --cell: clamp(72px, 24vw, 120px);
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f4f4f4;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #333;
    padding: 12px;
  }
  h1 {
    margin: 6px 0;
    font-weight: 600;
    font-size: 20px;
  }
  #info {
    display: flex;
    gap: 30px;
    font-size: 15px;
    margin-bottom: 16px;
    background: #fff;
    border: 1px solid #ddd;
    padding: 8px 20px;
    border-radius: 6px;
    color: #555;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, var(--cell));
    grid-template-rows: repeat(3, var(--cell));
    gap: clamp(8px, 3vw, 14px);
    background: #e2e2e2;
    padding: clamp(10px, 3vw, 20px);
    border-radius: 8px;
    border: 1px solid #ccc;
  }
  .hole {
    position: relative;
    width: var(--cell);
    height: var(--cell);
    background: #cfcfcf;
    border: 2px solid #aaa;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
    touch-action: manipulation;
  }
  .mole {
    position: absolute;
    left: 50%;
    bottom: -100%;
    width: 60%;
    height: 60%;
    transform: translateX(-50%);
    transition: bottom 0.15s ease-out;
    background: #666;
    border: 2px solid #444;
    border-radius: 50% 50% 45% 45%;
    user-select: none;
  }
  .hole.up .mole {
    bottom: 12%;
  }
  .hole.whacked .mole {
    bottom: -100% !important;
    transition: bottom 0.08s ease-in;
  }
  #message {
    margin-top: 18px;
    font-size: 16px;
    min-height: 28px;
    font-weight: 600;
    color: #555;
    text-align: center;
  }
  button {
    margin-top: 10px;
    padding: 10px 22px;
    font-size: 14px;
    border: 1px solid #999;
    border-radius: 5px;
    background: #fff;
    color: #333;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }
  button:hover { border-color: #555; }
</style>
</head>
<body>

<h1>Whack-a-Mole</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">30</span>s</div>
</div>
<div id="board"></div>
<div id="message"></div>
<button id="restartBtn">Play Again</button>

<script>
const board = document.getElementById('board');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

const NUM_HOLES = 9;
let holes = [];
let score, timeLeft, gameTimer, moleTimer, activeHole, gameOver;

function buildBoard() {
  board.innerHTML = '';
  holes = [];
  for (let i = 0; i < NUM_HOLES; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const mole = document.createElement('div');
    mole.className = 'mole';
    hole.appendChild(mole);
    hole.addEventListener('click', () => whack(i));
    board.appendChild(hole);
    holes.push(hole);
  }
}

function popRandomMole() {
  holes.forEach(h => h.classList.remove('up', 'whacked'));
  const idx = Math.floor(Math.random() * NUM_HOLES);
  activeHole = idx;
  holes[idx].classList.add('up');

  const upTime = Math.max(450, 1000 - score * 20);
  moleTimer = setTimeout(() => {
    if (!gameOver) {
      holes[idx].classList.remove('up');
      popRandomMole();
    }
  }, upTime);
}

function whack(i) {
  if (gameOver) return;
  if (i === activeHole && holes[i].classList.contains('up')) {
    holes[i].classList.add('whacked');
    holes[i].classList.remove('up');
    score++;
    scoreEl.textContent = score;
    clearTimeout(moleTimer);
    popRandomMole();
  }
}

function tick() {
  timeLeft--;
  timeEl.textContent = timeLeft;
  if (timeLeft <= 0) {
    endGame();
  }
}

function endGame() {
  gameOver = true;
  clearTimeout(moleTimer);
  clearInterval(gameTimer);
  holes.forEach(h => h.classList.remove('up'));
  messageEl.textContent = `Time's up! Final Score: ${score}`;
  restartBtn.style.display = 'inline-block';
}

function init() {
  buildBoard();
  score = 0;
  timeLeft = 30;
  gameOver = false;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  messageEl.textContent = '';
  restartBtn.style.display = 'none';
  gameTimer = setInterval(tick, 1000);
  popRandomMole();
}

restartBtn.addEventListener('click', init);

init();
</script>

</body>
</html>
